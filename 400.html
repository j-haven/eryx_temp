        <!-- {# djlint:off #} -->
        <!-- 400 -->
        <section id="error-400" class="error-sec">
            <div class="container">
                <div class="error-console reveal-rise">
                    <div class="error-console__bar">
                        <div class="error-console__dots">
                            <span></span><span></span><span></span>
                        </div>
                        <span class="error-console__label text-center">&middot; Error!</span>
                    </div>
                    <div class="error-console__log">
                        <span class="error-console__prompt">query&gt;</span>
                        <span>GET /this-page --expect=200</span>
                        <span class="error-console__err">ERR_BAD_REQUEST: malformed request (400)<span class="error-console__cursor"></span></span>
                    </div>
                    <div class="error-console__copy">
                        <h1>Oops! That request doesn't check out.</h1>
                        <p>Something about this request wasn't quite right. Double-check the link and try again.</p>
                        <div class="error-console__actions">
                            <a href="index.html" class="cta">
                                <i class="fa-solid fa-house me-1"></i> Home
                            </a>
                            <a href="contact.html" class="cta cta--ghost">
                                <i class="fa-solid fa-envelope me-1"></i> Report
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </section>
        <!-- 400 end -->
